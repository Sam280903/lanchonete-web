<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lanchonete do Bairro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <a href="index.html">Início</a> |
    <a href="#cardapio">Cardápio</a> |
    <a href="promocoes.html">Promoções</a> |
    <a href="#contato">Contato</a>
  </nav>

  <section id="hero">
    <h1>Bem-vindo à Lanchonete do Bairro</h1>
    <a href="#cardapio" class="btn">Ver Cardápio →</a>
  </section>

  <section id="cardapio">
    <h2>Nosso Cardápio</h2>
    <div class="itens" id="lista-cardapio">
      <div class="item">
        <img src="https://placehold.co/150x100" alt="X-Burguer" />
        <h3>X-Burguer</h3>
        <p>R$ 18,90</p>
        <button>Pedir</button>
      </div>
      <div class="item">
        <img src="https://placehold.co/150x100" alt="X-Bacon" />
        <h3>X-Bacon</h3>
        <p>R$ 21,90</p>
        <button>Pedir</button>
      </div>
      <div class="item">
        <img src="https://placehold.co/150x100" alt="Combo Família" />
        <h3>Combo Família</h3>
        <p>R$ 45,90</p>
        <button>Pedir</button>
      </div>
    </div>
  </section>

  <footer id="contato">
    <p>© 2024 Lanchonete do Bairro</p>
  </footer>

  <script src="cardapio.js"></script>

  <!-- Seção de contato adicionada na Q3 -->
  <section id="sobre">
    <h2>Sobre Nós</h2>
    <p>A Lanchonete do Bairro serve a comunidade desde 2010 com os melhores lanches da região.</p>
  </section>
</body>
</html>
